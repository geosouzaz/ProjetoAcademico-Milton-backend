# ============================================================
# docker-compose.yml — Microserviços Acadêmicos
# Portas: gateway 8080 | matricula 8081 | pessoa 8082
#         curso 8083 | disciplina 8084 | professor 8085 | turma 8086
#         app (auth) 8090
# ============================================================

services:

  # ── Auth (backend monolito, expõe /api/auth/**) ────────────
  app:
    build:
      context: ./backend
    container_name: app
    ports:
      - "8090:8080"
    networks:
      - microservicos-net
    mem_limit: 350m
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms128m -XX:+UseSerialGC

  # ── Gateway (roteamento centralizado) ──────────────────────
  gateway-service:
    build:
      context: ./microservicos/gateway-service
    container_name: gateway-service
    ports:
      - "8080:8080"
    depends_on:
      - app
      - matricula-service
      - pessoa-service
      - curso-service
      - disciplina-service
      - professor-service
      - turma-service
    networks:
      - microservicos-net
    mem_limit: 350m
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms128m -XX:+UseSerialGC

  # ── matricula-service (8081) ────────────────────────────────
  matricula-service:
    build:
      context: ./microservicos/matricula-service
    container_name: matricula-service
    ports:
      - "8081:8081"
    depends_on:
      - pessoa-service
      - curso-service
    networks:
      - microservicos-net
    mem_limit: 350m
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms128m -XX:+UseSerialGC
      - PESSOA_SERVICE_URL=http://pessoa-service:8082
      - CURSO_SERVICE_URL=http://curso-service:8083

  # ── pessoa-service (8082) ───────────────────────────────────
  pessoa-service:
    build:
      context: ./microservicos/pessoa-service
    container_name: pessoa-service
    ports:
      - "8082:8082"
    networks:
      - microservicos-net
    mem_limit: 350m
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms128m -XX:+UseSerialGC

  # ── curso-service (8083) ────────────────────────────────────
  curso-service:
    build:
      context: ./microservicos/curso-service
    container_name: curso-service
    ports:
      - "8083:8083"
    networks:
      - microservicos-net
    mem_limit: 350m
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms128m -XX:+UseSerialGC

  # ── disciplina-service (8084) ───────────────────────────────
  disciplina-service:
    build:
      context: ./microservicos/disciplina-service
    container_name: disciplina-service
    ports:
      - "8084:8084"
    networks:
      - microservicos-net
    mem_limit: 350m
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms128m -XX:+UseSerialGC

  # ── professor-service (8085) ────────────────────────────────
  professor-service:
    build:
      context: ./microservicos/professor-service
    container_name: professor-service
    ports:
      - "8085:8085"
    networks:
      - microservicos-net
    mem_limit: 350m
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms128m -XX:+UseSerialGC

  # ── turma-service (8086) ────────────────────────────────────
  turma-service:
    build:
      context: ./microservicos/turma-service
    container_name: turma-service
    ports:
      - "8086:8086"
    networks:
      - microservicos-net
    mem_limit: 350m
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms128m -XX:+UseSerialGC

# ── Rede comum para resolução por nome de serviço ──────────
networks:
  microservicos-net:
    driver: bridge
