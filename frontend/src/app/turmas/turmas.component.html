<div class="toast-container" *ngIf="toast">
  <div class="toast" [ngClass]="'toast-' + toast.type">{{ toast.msg }}</div>
</div>

<div class="page-header">
  <span class="page-title">🏫 Turmas</span>
  <button class="btn btn-success" *ngIf="auth.isProf()" (click)="openNew()">+ Novo</button>
</div>

<div class="card">
  <div class="loading-msg" *ngIf="loading">Carregando...</div>
  <div class="table-wrapper" *ngIf="!loading">
    <div class="empty-msg" *ngIf="items.length === 0">Nenhuma turma encontrada.</div>
    <table *ngIf="items.length > 0">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Semestre</th>
          <th>Status</th>
          <th *ngIf="auth.isProf()">Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of items">
          <td>{{ item.id }}</td>
          <td>{{ item.nome }}</td>
          <td>{{ item.semestre }}</td>
          <td>
            <span class="badge" [ngClass]="item.ativo ? 'badge-success' : 'badge-danger'">
              {{ item.ativo ? 'Ativo' : 'Inativo' }}
            </span>
          </td>
          <td *ngIf="auth.isProf()">
            <div class="actions-cell">
              <button class="btn btn-primary btn-sm" (click)="openEdit(item)">Editar</button>
              <button class="btn btn-danger btn-sm" (click)="remove(item)">Excluir</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" *ngIf="showModal" (click)="showModal = false">
  <div class="modal-box" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>{{ editing ? 'Editar Turma' : 'Nova Turma' }}</h3>
      <button class="modal-close" (click)="showModal = false">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Nome</label>
        <input type="text" [(ngModel)]="form.nome" placeholder="Nome da turma" />
      </div>
      <div class="form-group">
        <label>Semestre</label>
        <input type="text" [(ngModel)]="form.semestre" placeholder="Ex: 2024.1" />
      </div>
      <div class="form-group">
        <label>Status</label>
        <select [(ngModel)]="form.ativo">
          <option [ngValue]="true">Ativo</option>
          <option [ngValue]="false">Inativo</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" (click)="showModal = false">Cancelar</button>
      <button class="btn btn-primary" (click)="save()">Salvar</button>
    </div>
  </div>
</div>
