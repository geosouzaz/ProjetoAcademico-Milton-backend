server.port=8080

spring.application.name=gateway-service
spring.main.web-application-type=reactive

# Deve ter no minimo 32 bytes para HS256.
app.security.jwt.secret=minha-chave-secreta-super-segura-32bytes!!

spring.cloud.gateway.routes[0].id=auth
spring.cloud.gateway.routes[0].uri=http://app:8080
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=matricula
spring.cloud.gateway.routes[1].uri=http://matricula-service:8081
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/matriculas/**

spring.cloud.gateway.routes[2].id=pessoa
spring.cloud.gateway.routes[2].uri=http://pessoa-service:8082
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/pessoas/**

spring.cloud.gateway.routes[3].id=curso
spring.cloud.gateway.routes[3].uri=http://curso-service:8083
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/cursos/**

spring.cloud.gateway.routes[4].id=disciplina
spring.cloud.gateway.routes[4].uri=http://disciplina-service:8084
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/disciplinas/**

spring.cloud.gateway.routes[5].id=professor
spring.cloud.gateway.routes[5].uri=http://professor-service:8085
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/professores/**

spring.cloud.gateway.routes[6].id=turma
