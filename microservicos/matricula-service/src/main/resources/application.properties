server.port=8081

spring.application.name=matricula-service

spring.datasource.url=jdbc:h2:mem:matriculadb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# URLs dos outros microservicos para comunicacao inter-servicos
# Em Docker: usar nome do servico. Em desenvolvimento local: usar localhost
pessoa.service.url=http://pessoa-service:8082
curso.service.url=http://curso-service:8083
